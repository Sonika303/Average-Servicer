<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Average Servicer | Digital Studio</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .hero {
            padding: 100px 20px;
            border-bottom: 2px solid #333;
            width: 100%;
        }
        h1 { color: #00d4ff; font-size: 3rem; text-transform: uppercase; }
        .card-container {
            display: flex;
            gap: 20px;
            padding: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            border: 2px solid #333;
            padding: 20px;
            width: 250px;
            transition: 0.3s;
        }
        .card:hover {
            border-color: #ff4b2b;
            transform: translateY(-5px);
        }
        .btn {
            background: #00d4ff;
            color: black;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>AVERAGE SERVICER</h1>
        <p>WE BUILD THE STUFF YOU CAN'T.</p>
        <a href="YOUR_DISCORD_LINK" class="btn">OPEN A TICKET</a>
    </div>

    <div class="card-container">
        <div class="card">
            <h3>WEB DESIGN</h3>
            <p>From ₹199. High performance.</p>
        </div>
        <div class="card">
            <h3>ROBLOX DEV</h3>
            <p>From ₹99. Advanced scripting.</p>
        </div>
    </div>
</body>
</html>
