<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact // Average Servicer</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 4rem 7vw;
      max-width: 1100px;
      margin: 0 auto;
    }
    .c-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3rem 2rem;
      border-radius: 24px;
      text-align: center;
      transition: all 0.3s var(--ease);
      text-decoration: none;
      color: inherit;
    }
    .c-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: var(--sh2); }
    .c-card svg { width: 42px; height: 42px; margin-bottom: 1rem; }
    .c-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 0.5rem; }
    .c-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>

  <span class="nav-logo">AVG. SERVICER</span>

</nav>
