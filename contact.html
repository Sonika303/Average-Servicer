<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Hub // Average Servicer</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --form-bg: rgba(255, 255, 255, 0.03);
    }

    .hub-container {
      min-height: 100vh;
      padding: 140px 7vw 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── GMAIL FORM SECTION (TOP & DIFFERENT) ── */
    .form-section {
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 3rem;
      margin-bottom: 4rem;
      position: relative;
      overflow: hidden;
      box-shadow: var(--sh2);
    }

    /* Subtle glow for the top section */
    .form-section::before {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(74,127,245,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .form-header { text-align: center; margin-bottom: 2rem; }
    .form-header svg { width: 32px; height: 32px; stroke: #ea4335; margin-bottom: 10px; }

    form { display: grid; gap: 1.2rem; position: relative; z-index: 1; }
    
    .input-group { display: flex; flex-direction: column; gap: 8px; text-align: left; }
    .input-group label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
    
    input, textarea {
      background: rgba(0,0,0,0.03);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 120px; resize: none; }

    .submit-btn {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 16px;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s var(--ease);
    }
    .submit-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(74,127,245,0.2); }

    /* ── OTHER CHANNELS ── */
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 800px;
    }

    .hub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      transition: all 0.3s var(--ease);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .hub-card:hover { transform: translateY(-5px); border-color: var(--accent); }
    .hub-card svg { width: 32px; height: 32px; }
    .hub-card h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; }
    .hub-card p { font-size: 0.75rem; color: var(--muted); }

    .back-btn { margin-top: 50px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; }
  </style>
</head>
<body>

<nav id="navbar">
  <span class="nav-logo">AVG. SERVICER</span>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
  </ul>
</nav>

<div class="hub-container">
  
  <div class="form-section">
    <div class="form-header">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
      <h2 class="sec-title">Email Us</h2>
      <p class="sec-desc center">Direct inquiries through our secure server.</p>
    </div>

    <form action="https://formspree.io/f/your-form-id" method="POST">
      <div class="input-group">
        <label>Your Name</label>
        <input type="text" name="name" placeholder="John Doe" required>
      </div>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" name="_replyto" placeholder="john@example.com" required>
      </div>
      <div class="input-group">
        <label>Message</label>
        <textarea name="message" placeholder="Describe your project details..."></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Message</button>
    </form>
  </div>

  <div class="hub-grid">
    <a href="https://whatsapp.com/channel/0029VbCP6pEGZNCoKpUM7v2y" target="_blank" class="hub-card">
      <svg viewBox="0 0 24 24" fill="#25D366"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.975-1.407A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
      <h3>WhatsApp Channel</h3>
      <p>Follow for public updates & announcements.</p>
    </a>

    <a href="https://discord.com/invite/kBKKPJH39D" target="_blank" class="hub-card">
      <svg viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37"/></svg>
      <h3>Discord Server</h3>
      <p>Join our community for dev logs and chat.</p>
    </a>
  </div>

  <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
