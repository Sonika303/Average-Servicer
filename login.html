<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Average Servicer</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fcfcfc;
      --surface: rgba(255,255,255,0.70);
      --border: rgba(0,0,0,0.06);
      --text: #0d0d0d;
      --accent: #4a7ff5;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-card {
      background: var(--surface);
      backdrop-filter: blur(15px);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.04);
      width: 90%;
      max-width: 380px;
    }
    h1 { font-family: 'Syne'; font-size: 1.4rem; margin-bottom: 5px; }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-family: 'DM Mono';
      font-weight: bold;
      background: white;
      color: var(--text);
      cursor: pointer;
      border: 1px solid var(--border);
      transition: 0.3s;
      margin-top: 20px;
    }
    .google-btn:hover { background: #f9f9f9; transform: translateY(-2px); }
    .back-link { display: block; margin-top: 20px; font-size: 0.7rem; color: #888; text-decoration: none; text-transform: uppercase; }
    #status { margin-top: 15px; font-size: 0.75rem; color: var(--accent); display: none; }
  </style>
</head>
<body>

  <div class="login-card">
    <h1>AVERAGE SERVICER</h1>
    <p style="font-size: 0.7rem; opacity: 0.5;">// AUTHENTICATION</p>
    
    <button class="google-btn" id="googleLogin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="G" width="18">
      Sign in with Google
    </button>

    <div id="status">Syncing Data...</div>

    <a href="https://sonika303.github.io/Average-Servicer/" class="back-link">← Back to home</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDfT41VGcSPRkYDgflZFwtzQzyH5a3RUIM",
      authDomain: "average-servicer.firebaseapp.com",
      projectId: "average-servicer",
      storageBucket: "average-servicer.firebasestorage.app",
      messagingSenderId: "186112502875",
      appId: "1:186112502875:web:ba22beac9aac70fe9b237e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('googleLogin').onclick = async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        document.getElementById('status').style.display = 'block';

        // REALTIME DATABASE SAVE: users -> UserID -> Fields
        await set(ref(db, 'users/' + user.uid), {
          username: user.displayName,
          emailid: user.email
        });

        // Small delay to ensure save completes before redirect
        setTimeout(() => {
          window.location.href = "https://sonika303.github.io/Average-Servicer/";
        }, 1000);

      } catch (e) {
        console.error("Login failed:", e);
        alert("Make sure Google Auth is enabled in your Firebase console!");
      }
    };
  </script>
</body>
</html>
