<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login | Average Servicer</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:     #fcfcfc;
      --border: rgba(0,0,0,.06);
      --text:   #0d0d0d;
      --muted:  #888;
      --accent: #4a7ff5;
    }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'DM Mono',monospace; font-weight:300;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
    }
    /* subtle ambient blob */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 70% 50% at 75% -5%, rgba(100,160,255,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at -5% 90%, rgba(100,160,255,.04) 0%, transparent 55%);
    }
    .card {
      position:relative; z-index:1;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border); border-radius:24px;
      padding:42px 38px; width:90%; max-width:380px; text-align:center;
      box-shadow:0 12px 40px rgba(0,0,0,.05);
    }
    h1 {
      font-family:'Syne',sans-serif; font-weight:800;
      font-size:1.35rem; letter-spacing:-.01em; margin-bottom:6px;
    }
    .sub { font-size:.66rem; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); }

    .google-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; padding:14px; margin-top:28px;
      background:#fff; color:var(--text);
      border:1px solid rgba(0,0,0,.09); border-radius:12px;
      font-family:'DM Mono',monospace; font-size:.75rem; font-weight:300;
      letter-spacing:.06em; cursor:pointer;
      transition:background .2s, transform .25s, box-shadow .25s;
    }
    .google-btn:hover { background:#f7f7f7; transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.06); }
    .google-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    #status {
      margin-top:16px; font-size:.7rem; letter-spacing:.12em;
      text-transform:uppercase; color:var(--accent); display:none;
    }
    .back {
      display:block; margin-top:22px;
      font-size:.66rem; letter-spacing:.15em; text-transform:uppercase;
      color:var(--muted); text-decoration:none; transition:color .2s;
    }
    .back:hover { color:var(--text); }
  </style>
</head>
<body>

<div class="card">
  <h1>AVERAGE SERVICER</h1>
  <p class="sub">// Authentication</p>

  <button class="google-btn" id="googleLogin">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" alt="G" width="18"/>
    Sign in with Google
  </button>

  <div id="status">Syncing data...</div>

  <a href="https://sonika303.github.io/Average-Servicer/" class="back">← Back to home</a>
</div>

<script type="module">
  import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, get, update }          from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const app = initializeApp({
    apiKey:            "AIzaSyDfT41VGcSPRkYDgflZFwtzQzyH5a3RUIM",
    authDomain:        "average-servicer.firebaseapp.com",
    databaseURL:       "https://average-servicer-default-rtdb.firebaseio.com",
    projectId:         "average-servicer",
    storageBucket:     "average-servicer.firebasestorage.app",
    messagingSenderId: "186112502875",
    appId:             "1:186112502875:web:ba22beac9aac70fe9b237e"
  });

  const auth     = getAuth(app);
  const db       = getDatabase(app);
  const provider = new GoogleAuthProvider();
  const btn      = document.getElementById('googleLogin');
  const status   = document.getElementById('status');

  btn.onclick = async () => {
    btn.disabled = true;

    try {
      const result = await signInWithPopup(auth, provider);
      const user   = result.user;
      status.style.display = 'block';

      const userRef     = ref(db, 'users/' + user.uid);
      const snapshot    = await get(userRef);
      const existsAlready = snapshot.exists();

      if (existsAlready) {
        // ── Returning user: only refresh mutable login fields, NEVER touch
        //    orderCount, pfpColor, or any other saved preference ──
        await update(userRef, {
          username: user.displayName,
          emailid:  user.email
          // intentionally NOT setting orderCount or pfpColor
        });
      } else {
        // ── Brand-new user: safe to initialise all fields for the first time ──
        await update(userRef, {
          username:   user.displayName,
          emailid:    user.email,
          orderCount: 0
          // pfpColor left absent — user picks it later in settings
        });
      }

      setTimeout(() => {
        window.location.href = "https://sonika303.github.io/Average-Servicer/";
      }, 900);

    } catch (err) {
      console.error("Login error:", err.code, err.message);
      alert("Login failed: " + err.message);
      btn.disabled = false;
      status.style.display = 'none';
    }
  };
</script>
</body>
</html>
